<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Mini Royale Multiplayer</title>
  <style>
    body { margin:0; background:#111; overflow:hidden; }
    canvas { display:block; margin:auto; background:#222; }
  </style>
</head>
<body>
<canvas id="game"></canvas>
<script src="/socket.io/socket.io.js"></script>
<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const socket = io();
let players = {};

socket.on("currentPlayers", (p) => { players = p; });
socket.on("newPlayer", (p) => { players[p.id] = { x:p.x, y:p.y }; });
socket.on("playerMoved", (p) => { players[p.id] = { x:p.x, y:p.y }; });
socket.on("playerDisconnected", (id) => { delete players[id]; });

let me = { x:100, y:100 };

function loop() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for (let id in players) {
    const p = players[id];
    ctx.fillStyle = (id === socket.id ? "cyan" : "red");
    ctx.fillRect(p.x, p.y, 30, 30);
  }
  requestAnimationFrame(loop);
}
loop();

window.addEventListener("keydown", e => {
  if (e.key === "w") me.y -= 5;
  if (e.key === "s") me.y += 5;
  if (e.key === "a") me.x -= 5;
  if (e.key === "d") me.x += 5;
  players[socket.id] = me;
  socket.emit("move", me);
});
</script>
</body>
</html>
